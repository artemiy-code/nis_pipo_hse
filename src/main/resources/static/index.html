<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Application Test Client</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Demo Application Test Client</h1>
        <p>Test your API endpoints with this simple interface</p>
    </div>

    <div class="content">
        <div id="alert" class="alert"></div>

        <div class="auth-section">
            <div class="auth-form">
                <h3>Register</h3>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="Enter username">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="Enter email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Enter password">
                </div>
                <button onclick="register()">Register</button>
            </div>

            <div class="auth-form">
                <h3>Login</h3>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="login-username" placeholder="Enter username">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter password">
                </div>
                <button onclick="login()">Login</button>
                <div id="token-info" class="token-info" style="display:none;"></div>
            </div>
        </div>

        <div class="items-section" id="items-section" style="display:none;">
            <div class="items-header">
                <h2>My Items</h2>
                <button onclick="showCreateForm()">Create New Item +</button>
            </div>

            <div id="create-item-form" class="create-item-form">
                <h3>Create New Item</h3>
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" id="item-name" placeholder="Item name">
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <textarea id="item-description" rows="3" placeholder="Item description"></textarea>
                </div>
                <div class="input-group">
                    <label>Price</label>
                    <input type="number" id="item-price" step="0.01" placeholder="Price">
                </div>
                <button onclick="createItem()">Create</button>
                <button onclick="hideCreateForm()" style="background:#95a5a6;">Cancel</button>
            </div>

            <div class="items-list">
                <div id="loading" class="loading">Loading...</div>
                <div id="items-container"></div>
                <div id="pagination" class="pagination"></div>
            </div>
        </div>
    </div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-content">
        <h3>Edit Item</h3>
        <div class="input-group">
            <label>Name</label>
            <input type="text" id="edit-name">
        </div>
        <div class="input-group">
            <label>Description</label>
            <textarea id="edit-description" rows="3"></textarea>
        </div>
        <div class="input-group">
            <label>Price</label>
            <input type="number" id="edit-price" step="0.01">
        </div>
        <div class="input-group">
            <label>Status</label>
            <select id="edit-status">
                <option value="ACTIVE">ACTIVE</option>
                <option value="INACTIVE">INACTIVE</option>
                <option value="DELETED">DELETED</option>
            </select>
        </div>
        <button onclick="updateItem()">Update</button>
        <button onclick="closeModal()" style="background:#95a5a6;">Cancel</button>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
